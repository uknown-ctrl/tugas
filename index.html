<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EchoTracker V3.9 - With History</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        :root {
            --primary: #2e7d32; --accent: #43a047; --bg: #f8f9fa;
            --white: #ffffff; --text-dark: #212121; --text-light: #757575;
            --shadow: 0 4px 12px rgba(0,0,0,0.08); --gold: #fbc02d;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text-dark); }
        .container-wrapper { max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; background: var(--bg); }

        /* --- AUTH --- */
        #auth-container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%); }
        .auth-card { background: var(--white); padding: 25px; border-radius: 24px; box-shadow: var(--shadow); }
        .auth-tabs { display: flex; margin-bottom: 20px; background: #f0f0f0; padding: 5px; border-radius: 12px; }
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 8px; cursor: pointer; color: #777; font-size: 0.9em; }
        .tab.active { background: white; color: var(--primary); font-weight: bold; box-shadow: var(--shadow); }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }

        /* --- MAIN APP --- */
        #app-container { display: none; padding-bottom: 100px; }
        .app-header { background: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .wallet-card { background: linear-gradient(135deg, var(--primary), var(--accent)); margin: 15px; padding: 20px; border-radius: 20px; color: white; box-shadow: 0 8px 16px rgba(46,125,50,0.2); }
        
        /* --- SCANNER --- */
        .scan-window { position: relative; width: 100%; height: 230px; background: #000; border-radius: 24px; overflow: hidden; border: 4px solid var(--white); }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #00ff00; top: 0; animation: scanning 2s infinite linear; box-shadow: 0 0 15px #00ff00; }
        @keyframes scanning { 0% { top: 0%; } 100% { top: 100%; } }

        /* --- TABLES & LISTS --- */
        .history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        .history-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.85em; }

        /* --- SPIN OVERLAY --- */
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
        #wheel { width: 240px; height: 240px; border-radius: 50%; border: 5px solid white; margin: 15px 0; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); background: conic-gradient(#e53935 0deg 45deg, #fbc02d 45deg 90deg, #4caf50 90deg 135deg, #0277bd 135deg 180deg, #8e24aa 180deg 225deg, #fb8c00 225deg 270deg, #9e9e9e 270deg 315deg, #f06292 315deg 360deg); }
        .prize-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 320px; margin-top: 15px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; font-size: 0.75em; }
        .p-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        /* --- NAV --- */
        .btn { border: none; padding: 15px; border-radius: 14px; cursor: pointer; width: 100%; font-size: 1em; font-weight: bold; margin: 10px 0; }
        .btn-primary { background: var(--primary); color: white; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; padding: 10px 0 25px 0; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; font-size: 0.75em; color: var(--text-light); cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container-wrapper">
    <div id="auth-container">
        <h1 style="text-align:center; color:var(--primary);">EchoTracker</h1>
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="tab active" id="t-login" onclick="switchAuth('login')">Masuk</div>
                <div class="tab" id="t-reg" onclick="switchAuth('register')">Daftar</div>
            </div>
            <input type="text" id="u-input" placeholder="Username">
            <input type="password" id="p-input" placeholder="Password">
            <button class="btn btn-primary" onclick="handleAuth()">MASUK / DAFTAR</button>
        </div>
    </div>

    <div id="app-container">
        <div class="app-header">
            <b>Halo, <span id="display-name" style="color:var(--primary)"></span></b>
            <small onclick="location.reload()" style="color:red; cursor:pointer; font-weight:bold;">Log Out</small>
        </div>

        <div id="page-home">
            <div class="wallet-card">
                <small>Saldo Rupiah</small>
                <div style="font-size:1.8em; font-weight:800;" id="stat-money">Rp 0</div>
                <div style="display:flex; justify-content: space-between; margin: 10px 0;">
                    <small>Koin: <b id="stat-coins">0</b></small>
                    <small>Total Botol: <b id="stat-total">0</b></small>
                </div>
                <button onclick="convertCoins()" style="background:rgba(255,255,255,0.2); border:1px solid white; color:white; padding:10px; border-radius:10px; width:100%; cursor:pointer; font-weight:bold;">TUKAR KOIN</button>
            </div>
            
            <div style="padding: 15px;">
                <div style="text-align:center; margin-bottom:10px;"><b id="ai-msg" style="color:var(--primary)">Menyiapkan Kamera...</b></div>
                <div class="scan-window">
                    <video id="webcam" autoplay playsinline muted></video>
                    <div class="scan-line"></div>
                </div>
                <button class="btn" id="btn-redeem" style="background:#1b5e20; color:white; display:none;" onclick="redeem()">✅ KLAIM 1 KOIN</button>
            </div>
        </div>

        <div id="page-rank" style="display:none; padding:15px;">
            <h3>🏆 Papan Peringkat</h3>
            <table class="history-table"><tbody id="rank-body"></tbody></table>
        </div>

        <div id="page-history" style="display:none; padding:15px;">
            <h3>📜 Riwayat Aktivitas</h3>
            <table class="history-table"><tbody id="log-body"></tbody></table>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="n-home" onclick="showPage('home')">🏠<br>Home</div>
            <div class="nav-item" onclick="openGame()">🎡<br>Spin</div>
            <div class="nav-item" id="n-rank" onclick="showPage('rank')">🏆<br>Rank</div>
            <div class="nav-item" id="n-history" onclick="showPage('history')">📜<br>History</div>
        </div>
    </div>

    <div id="game-overlay">
        <h2 style="color:var(--gold); margin:0;">ECO-SPIN</h2>
        <small>Biaya 10 Koin</small>
        <div id="wheel"></div>
        <button class="btn" id="spin-btn" style="background:var(--gold); color:black; width:200px;" onclick="spin()">PUTAR</button>
        <div class="prize-legend">
            <div class="p-item"><div class="dot" style="background:#e53935;"></div> Zonk</div>
            <div class="p-item"><div class="dot" style="background:#f06292;"></div> Rp 1.000</div>
            <div class="p-item"><div class="dot" style="background:#9e9e9e;"></div> +2 Koin</div>
            <div class="p-item"><div class="dot" style="background:#fb8c00;"></div> Rp 500</div>
            <div class="p-item"><div class="dot" style="background:#8e24aa;"></div> JP 50 Koin</div>
            <div class="p-item"><div class="dot" style="background:#0277bd;"></div> +20 Koin</div>
            <div class="p-item"><div class="dot" style="background:#4caf50;"></div> Rp 100</div>
            <div class="p-item"><div class="dot" style="background:#fbc02d;"></div> +5 Koin</div>
        </div>
        <button onclick="closeGame()" style="background:none; border:1px solid white; color:white; padding:8px 25px; border-radius:20px; margin-top:15px; cursor:pointer;">Kembali</button>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('ecoUsers')) || {};
    let currentUser = null;
    let authMode = 'login';
    let model = null;
    let spinning = false;

    function switchAuth(m) {
        authMode = m;
        document.getElementById('t-login').classList.toggle('active', m === 'login');
        document.getElementById('t-reg').classList.toggle('active', m === 'register');
    }

    function handleAuth() {
        const u = document.getElementById('u-input').value.trim();
        const p = document.getElementById('p-input').value;
        if(!u || !p) return alert("Data harus diisi!");
        if(authMode === 'register') {
            if(users[u]) return alert("User sudah terdaftar!");
            users[u] = { pass: p, coins: 0, total: 0, money: 0, logs: [] };
            save(); alert("Berhasil Terdaftar!"); switchAuth('login');
        } else {
            if(!users[u] || users[u].pass !== p) return alert("Login Gagal!");
            currentUser = u;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('display-name').innerText = currentUser;
            refreshUI(); startScanner();
        }
    }

    async function startScanner() {
        const msg = document.getElementById('ai-msg');
        try {
            msg.innerText = "Memuat AI...";
            model = await mobilenet.load();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('webcam').srcObject = stream;
            msg.innerText = "🔍 Mencari Botol...";
            setInterval(async () => {
                if(model && document.getElementById('webcam').readyState === 4) {
                    const pred = await model.classify(document.getElementById('webcam'));
                    const found = pred.some(p => p.className.toLowerCase().includes('bottle') && p.probability > 0.45);
                    document.getElementById('btn-redeem').style.display = found ? "block" : "none";
                }
            }, 800);
        } catch (e) { msg.innerText = "Kamera Error!"; }
    }

    function redeem() {
        users[currentUser].coins++;
        users[currentUser].total++;
        addLog("Scan Botol", "+1 Koin", "green");
        refreshUI();
    }

    function convertCoins() {
        const d = users[currentUser];
        if(d.coins < 1) return alert("Koin tidak cukup!");
        const untung = d.coins * 20;
        d.money += untung;
        addLog("Tukar Koin", "+Rp " + untung, "blue");
        d.coins = 0;
        refreshUI();
    }

    function addLog(act, res, col) {
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        users[currentUser].logs.unshift({time, act, res, col});
        save();
    }

    function spin() {
        const d = users[currentUser];
        if(spinning || d.coins < 10) return alert("Butuh 10 Koin!");
        d.coins -= 10; spinning = true; refreshUI();
        const extraDeg = Math.floor(Math.random() * 360);
        const totalDeg = 2160 + extraDeg;
        document.getElementById('wheel').style.transform = `rotate(${totalDeg}deg)`;
        setTimeout(() => {
            spinning = false;
            const res = 360 - (extraDeg % 360);
            let prize = "", col = "";
            if(res < 45) { prize = "Zonk"; col = "red"; }
            else if(res < 90) { d.money += 1000; prize = "Rp 1.000"; col = "#f06292"; }
            else if(res < 135) { d.coins += 2; prize = "+2 Koin"; col = "#9e9e9e"; }
            else if(res < 180) { d.money += 500; prize = "Rp 500"; col = "#fb8c00"; }
            else if(res < 225) { d.coins += 50; prize = "50 Koin"; col = "#8e24aa"; }
            else if(res < 270) { d.coins += 20; prize = "+20 Koin"; col = "#0277bd"; }
            else if(res < 315) { d.money += 100; prize = "Rp 100"; col = "#4caf50"; }
            else { d.coins += 5; prize = "+5 Koin"; col = "#fbc02d"; }
            addLog("Eco-Spin", prize, col);
            alert("Kamu dapat: " + prize);
            refreshUI();
        }, 4000);
    }

    function refreshUI() {
        const d = users[currentUser];
        document.getElementById('stat-money').innerText = "Rp " + d.money.toLocaleString('id-ID');
        document.getElementById('stat-coins').innerText = d.coins;
        document.getElementById('stat-total').innerText = d.total;
        document.getElementById('log-body').innerHTML = d.logs.map(l => `<tr><td>${l.time}<br><small>${l.act}</small></td><td style="text-align:right; color:${l.col}"><b>${l.res}</b></td></tr>`).join('');
        save();
    }

    function showPage(p) {
        ['home', 'rank', 'history'].forEach(id => {
            document.getElementById('page-'+id).style.display = (id === p) ? 'block' : 'none';
            document.getElementById('n-'+id).classList.toggle('active', id === p);
        });
        if(p === 'rank') {
            const sorted = Object.keys(users).map(n => ({n, t: users[n].total})).sort((a,b) => b.t - a.t);
            document.getElementById('rank-body').innerHTML = sorted.map((u, i) => `<tr><td>#${i+1}</td><td>${u.n}</td><td style="text-align:right;">${u.t} Botol</td></tr>`).join('');
        }
    }

    function openGame() { document.getElementById('game-overlay').style.display = 'flex'; }
    function closeGame() { if(!spinning) document.getElementById('game-overlay').style.display = 'none'; }
    function save() { localStorage.setItem('ecoUsers', JSON.stringify(users)); }
</script>
</body>
</html>
